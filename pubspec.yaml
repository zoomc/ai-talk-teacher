name: speakflow
description: "AI English Speaking Practice App with Virtual Tutor"
publish_to: 'none'
version: 1.0.2+3

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # UI & Theming
  cupertino_icons: ^1.0.8
  dynamic_color: ^1.8.1
  shimmer: ^2.0.0
  flutter_animate: ^4.5.2

  # State Management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Database
  sqflite: ^2.4.2
  sqflite_common_ffi_web: ^1.1.2
  path: ^1.9.1
  path_provider: ^2.1.5

  # Secure Storage
  flutter_secure_storage: ^9.2.4

  # HTTP
  http: ^1.4.0

  # Audio
  record: ^5.2.1
  just_audio: ^0.9.43

  # Utilities
  uuid: ^4.5.1
  intl: ^0.20.2
  equatable: ^2.0.7

  # Platform
  shared_preferences: ^2.5.3
  url_launcher: ^6.3.1

  # 3D avatar (mobile/desktop webview; web uses HtmlElementView)
  webview_flutter: ^4.10.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/animations/
    - assets/images/
    - assets/3d/
