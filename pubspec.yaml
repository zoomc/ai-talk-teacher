name: speakflow
description: "AI English Speaking Practice App with Virtual Tutor"
publish_to: 'none'
version: 1.0.5+6

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # UI & Theming
  cupertino_icons: ^1.0.8
  dynamic_color: ^1.8.1
  shimmer: ^2.0.0
  flutter_animate: ^4.5.2

  # State Management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Database
  sqflite: ^2.4.2
  sqflite_common_ffi_web: ^1.1.2
  path: ^1.9.1
  path_provider: ^2.1.5

  # Secure Storage
  flutter_secure_storage: ^9.2.4

  # HTTP
  http: ^1.4.0

  # Audio
  record: ^5.2.1
  just_audio: ^0.9.43

  # Utilities
  uuid: ^4.5.1
  intl: ^0.20.2
  equatable: ^2.0.7

  # Platform
  shared_preferences: ^2.5.3
  url_launcher: ^6.3.1

  # 3D avatar (mobile/desktop webview; web uses HtmlElementView)
  webview_flutter: ^4.10.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/animations/
    - assets/images/
    - assets/3d/
    # Phase 3 — Live2D model folder. Empty in this commit; when a model
    # ships (outsourced Live2D art), drop the .model3.json + .moc3 +
    # textures + motions + expressions under assets/live2d/tutor/ and the
    # loader (lib/features/avatar/data/live2d_loader.dart) will pick it up
    # automatically. The directory entry must exist for Flutter to include
    # any sub-paths at build time.
    - assets/live2d/
